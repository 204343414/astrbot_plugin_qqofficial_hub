<!doctype html>
<html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>QQ Official Hub</title><link rel="stylesheet" href="./styles.css"></head>
<body><main><header><div><p class="eyebrow">QQ OFFICIAL HUB</p><h1>头条卡片编辑器</h1><p class="sub">编辑 Markdown 正文和最多 5×5 个按钮；保存后可发送到已观察群测试。</p></div><div class="header-actions"><button id="send-test" class="secondary">发送到群测试</button><button id="save" class="primary">保存当前配置</button></div></header><p id="notice" role="status"></p><section class="layout"><aside><h2>作用范围</h2><label>配置对象<select id="scope"><option value="global">全局默认模板</option><option value="group">已观察群覆盖</option></select></label><label id="group-wrap">群会话<select id="group"></select></label><hr><h2>卡片内容</h2><label>卡片名称<input id="name" maxlength="64"></label><label>Markdown 文案<textarea id="markdown" maxlength="4000" placeholder="# 标题&#10;[🔗蓝色链接](https://...)&#10;![说明 #618px #249px](https://...)"></textarea></label><div class="markdown-tools"><button id="insert-link" class="secondary">插入蓝色链接示例</button><button id="insert-image" class="secondary">插入图片示例</button></div><div class="text-command-builder"><h3>蓝色参数指令文本</h3><div class="twocol"><label>显示文字<input id="cmd-show" maxlength="100" value="📡 添加订阅"></label><label>写入输入框<input id="cmd-text" maxlength="100" value="/myrss + "></label></div><label class="inline-check"><input id="cmd-reference" type="checkbox"> 写入输入框时引用当前卡片</label><button id="insert-cmd-input" class="secondary">插入蓝色参数指令</button><p class="hint">点击后只写入输入框，不自动发送；用户可继续补 URL 或参数。</p></div><label class="inline-check"><input id="mention-clicker" type="checkbox"> type=1 回调后新卡片顶部 At 点击者</label><p class="hint">图片必须是公网 HTTPS；蓝色正文实际是可点击链接。群覆盖仅对选中的已观察 QQ Official 群生效。</p></aside><section class="editor"><div class="preview"><h2 id="preview-title"></h2><article id="preview-markdown"></article><div id="canvas" class="canvas" aria-label="5行5列按钮画布"></div></div><div class="tools"><h2>按钮编辑</h2><p class="hint">点击按钮编辑；拖动按钮可调整位置。第一版仅保存并预览，尚不发送真实 Keyboard。</p><div id="form" hidden><label>按钮文字<input id="label" maxlength="64"></label><label>点击后文字<input id="visited-label" maxlength="64"></label><div class="twocol"><label>样式<select id="style"><option value="0">灰色线框</option><option value="1">蓝色线框</option></select></label><label>动作<select id="action-type"><option value="1">后台回调</option><option value="2">插入指令</option><option value="0">打开 URL</option></select></label></div><label>动作数据<input id="data" maxlength="2048"></label><div class="checks"><label><input id="reply" type="checkbox"> 指令按钮引用原消息</label><label><input id="enter" type="checkbox"> 自动发送（仅单聊有效）</label><label><input id="anchor" type="checkbox"> 📎 唤起选图器（仅单聊移动端）</label></div><label>不支持时提示<input id="unsupport-tips" maxlength="80"></label><label>谁能点击<select id="permission"><option value="everyone">所有人</option><option value="group_manager">仅群管理</option><option value="astrbot_admin">AstrBot 管理员</option><option value="operator">Hub 操作员</option><option value="specified_users">指定 OpenID</option></select></label><label id="users-wrap">指定 OpenID（每行一个）<textarea id="users"></textarea></label><div class="actions"><button id="delete" class="danger">删除按钮</button><button id="add" class="secondary">新增按钮</button></div></div></div></section></section></main><script type="module" src="./app.js"></script></body></html>
